<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחשבון פלייאוף - תרחישים מתקדמים</title>
    <style>
        :root { --primary: #1a237e; --accent: #ff6d00; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .control-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; width: 100%; max-width: 1000px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .group { border: 1px solid #eee; padding: 15px; border-radius: 10px; }
        .group-title { font-weight: bold; margin-bottom: 10px; color: var(--primary); border-bottom: 2px solid var(--accent); display: inline-block; }
        select { width: 100%; padding: 8px; border-radius: 5px; cursor: pointer; }
        .bracket { display: flex; gap: 30px; justify-content: center; margin-top: 20px; width: 100%; overflow-x: auto; }
        .column { display: flex; flex-direction: column; gap: 20px; }
        .matchup { background: white; border: 1px solid #ddd; border-radius: 8px; width: 220px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .team { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .seed { background: #eee; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>מחשבון תרחישי פלייאוף</h1>

    <div class="control-panel">
        <div class="group">
            <div class="group-title">מקום 2</div>
            <select id="s2" onchange="update()">
                <option value="עירוני נהריה">עירוני נהריה</option>
                <option value="רחובות">רחובות</option>
            </select>
        </div>
        <div class="group">
            <div class="group-title">מקום 3</div>
            <select id="s3" onchange="update()">
                <option value="רחובות">רחובות</option>
                <option value="עירוני נהריה">עירוני נהריה</option>
            </select>
        </div>

        <div class="group">
            <div class="group-title">מקום 4</div>
            <select id="s4" onchange="update()">
                <option value="הפועל חיפה">הפועל חיפה</option>
                <option value="מכבי אשדוד">מכבי אשדוד</option>
            </select>
        </div>
        <div class="group">
            <div class="group-title">מקום 5</div>
            <select id="s5" onchange="update()">
                <option value="מכבי אשדוד">מכבי אשדוד</option>
                <option value="אליצור אשקלון">אליצור אשקלון</option>
                <option value="הפועל חיפה">הפועל חיפה</option>
            </select>
        </div>

        <div class="group">
            <div class="group-title">מקום 6</div>
            <select id="s6" onchange="update()">
                <option value="אליצור אשקלון">אליצור אשקלון</option>
                <option value="מכבי אשדוד">מכבי אשדוד</option>
            </select>
        </div>

        <div class="group">
            <div class="group-title">מקום 7</div>
            <select id="s7" onchange="update()">
                <option value="אליצור שומרון">אליצור שומרון</option>
                <option value="רמת השרון">רמת השרון</option>
                <option value="מגדל העמק יזרעאל">מגדל העמק יזרעאל</option>
                <option value="עוטף דרום">עוטף דרום</option>
            </select>
        </div>
        <div class="group">
            <div class="group-title">מקום 8</div>
            <select id="s8" onchange="update()">
                <option value="רמת השרון">רמת השרון</option>
                <option value="אליצור שומרון">אליצור שומרון</option>
                <option value="מגדל העמק יזרעאל">מגדל העמק יזרעאל</option>
                <option value="עוטף דרום">עוטף דרום</option>
            </select>
        </div>
        <div class="group">
            <div class="group-title">מקום 9</div>
            <select id="s9" onchange="update()">
                <option value="מגדל העמק יזרעאל">מגדל העמק יזרעאל</option>
                <option value="עוטף דרום">עוטף דרום</option>
                <option value="אליצור יבנה">אליצור יבנה</option>
                <option value="מכבי פתח תקווה">מכבי פתח תקווה</option>
                <option value="אליצור שומרון">אליצור שומרון</option>
                <option value="רמת השרון">רמת השרון</option>
            </select>
        </div>
    </div>

    <div class="bracket">
        <div class="column">
            <h3>רבע גמר</h3>
            <div class="matchup" id="m1"></div>
            <div class="matchup" id="m2"></div>
            <div class="matchup" id="m3"></div>
            <div class="matchup" id="m4"></div>
        </div>
        <div class="column">
            <h3>חצי גמר</h3>
            <div class="matchup"><div class="team">מנצחת 2-9</div><div class="team">מנצחת 5-6</div></div>
            <div class="matchup"><div class="team">מנצחת 3-8</div><div class="team">מנצחת 4-7</div></div>
        </div>
    </div>

    <script>
        function update() {
            let seeds = {};
            // איסוף ערכים מהתיבות
            for(let i=2; i<=9; i++) {
                seeds[i] = document.getElementById('s' + i).value;
            }

            render('m1', 2, seeds[2], 9, seeds[9]);
            render('m2', 5, seeds[5], 6, seeds[6]);
            render('m3', 3, seeds[3], 8, seeds[8]);
            render('m4', 4, seeds[4], 7, seeds[7]);
        }

        function render(id, s1, t1, s2, t2) {
            document.getElementById(id).innerHTML = `
                <div class="team"><span><span class="seed">${s1}</span> ${t1}</span></div>
                <div class="team"><span><span class="seed">${s2}</span> ${t2}</span></div>
            `;
        }
        
        // הרצה ראשונית
        update();
    </script>
</body>
</html>
