<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחשבון פלייאוף - בחירה חופשית</title>
    <style>
        :root { --primary: #1a237e; --accent: #ff6d00; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); margin: 0; padding: 20px; direction: rtl; }
        h1 { text-align: center; color: var(--primary); }
        
        .control-panel { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 0 auto 30px; 
            max-width: 1000px; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; 
        }

        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; font-size: 0.9em; color: #555; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
        
        .error-msg { 
            grid-column: 1 / -1; color: #d32f2f; background: #ffcdd2; 
            padding: 10px; border-radius: 8px; text-align: center; 
            display: none; font-weight: bold;
        }

        .bracket { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
        .column { display: flex; flex-direction: column; gap: 20px; }
        .matchup { background: white; border: 1px solid #ddd; border-radius: 10px; width: 230px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .team { padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .team:last-child { border-bottom: none; }
        .seed { background: var(--primary); color: white; padding: 2px 7px; border-radius: 4px; font-size: 12px; margin-left: 8px; }
        .home { font-weight: bold; background: #f9f9f9; }
    </style>
</head>
