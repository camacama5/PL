<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחשבון תרחישי פלייאוף</title>
    <style>
        :root { --primary: #1a237e; --bg: #f4f7f9; }
        body { 
            font-family: 'Segoe UI', system-ui; 
            background: var(--bg); 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            direction: rtl;
        }

        h1 { color: var(--primary); margin-bottom: 30px; font-size: 2.5rem; }

        /* עיצוב הפאנל הלבן מהתמונה */
        .control-panel { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 1000px; 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 20px; 
            margin-bottom: 40px;
        }

        .group { display: flex; flex-direction: column; gap: 8px; }
        .group.wide { grid-column: span 1; }
        /* הזזה של מקומות 7-8 ימינה כמו בתמונה */
        .indent-7 { grid-column: 4; }
        .indent-8 { grid-column: 5; }

        label { font-weight: bold; font-size: 0.9rem; color: #333; text-align: center; }

        select { 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            background: #fff; 
            font-family: inherit;
            cursor: pointer;
            text-align: center;
        }

        .error-msg { 
            grid-column: 1 / -1; color: #d32f2f; background: #ffcdd2; 
            padding: 10px; border-radius: 8px; text-align: center; 
            display: none; font-weight: bold; margin-bottom: 10px;
        }

        /* עיצוב הבראקט (המשחקים) */
        .bracket { display: flex; gap: 50px; justify-content: center; width: 100%; flex-wrap: wrap; }
        .column { display: flex; flex-direction: column; gap: 20px; }
        .column h3 { color: var(--primary); text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .matchup { 
            background: white; border-radius: 12px; width: 250px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; 
        }
        
        .team { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f5f5f5; }
        .team:last-child { border-bottom: none; }
        .seed { background: var(--primary); color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
        .home { background: #fafafa; font-weight: bold; }
    </style>
</head>
<body>
